<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.88)),
url("IMG_0511.jpeg");

background-size:cover;
background-position:center;
background-attachment:fixed;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

width:650px;
height:650px;

left:-250px;
top:-250px;

border-radius:50%;

background:radial-gradient(#00d4ff40,transparent 70%);

animation:spin1 15s linear infinite;

}

body::after{

content:"";

position:fixed;

width:650px;
height:650px;

right:-250px;
bottom:-250px;

border-radius:50%;

background:radial-gradient(#8f5bff40,transparent 70%);

animation:spin2 18s linear infinite;

}

@keyframes spin1{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes spin2{

from{
transform:rotate(360deg);
}

to{
transform:rotate(0deg);
}

}

.container{

position:relative;

width:100%;
max-width:430px;

margin:25px;

padding:30px;

border-radius:35px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.18);

backdrop-filter:blur(28px);

box-shadow:0 20px 60px rgba(0,0,0,.45);

overflow:hidden;

animation:show .8s ease;

}

@keyframes show{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.profile{

position:relative;

text-align:center;

}

.profile img{

width:150px;
height:150px;

border-radius:50%;

object-fit:cover;

border:5px solid rgba(255,255,255,.9);

box-shadow:0 0 35px rgba(255,255,255,.35);

animation:glow 3s ease-in-out infinite;

transition:.4s;

}

.profile img:hover{

transform:scale(1.05);

}

@keyframes glow{

0%,100%{
box-shadow:0 0 20px rgba(255,255,255,.25);
}

50%{
box-shadow:0 0 45px rgba(255,255,255,.6);
}

}

.crown{

font-size:30px;

color:gold;

margin-top:-18px;

animation:float 2s ease-in-out infinite;

}

@keyframes float{

50%{
transform:translateY(-7px);
}

}

.profile h1{

margin-top:12px;

font-size:34px;

font-weight:800;

color:#fff;

}

.profile p{

margin-top:8px;

font-size:15px;

color:#ddd;

}

.email{

margin-top:10px;

color:#bbb;

font-size:14px;

}

.links{

display:flex;

flex-direction:column;

gap:15px;

margin-top:35px;

}

.card{

position:relative;

display:flex;

justify-content:space-between;

align-items:center;

padding:18px 22px;

border-radius:22px;

background:rgba(255,255,255,.10);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(15px);

text-decoration:none;

color:#fff;

overflow:hidden;

transition:.35s;

}

.card:hover{

transform:translateY(-5px) scale(1.03);

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

.card::before{

content:"";

position:absolute;

left:-100%;

top:0;

width:100%;

height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.18),
transparent
);

transition:.7s;

}

.card:hover::before{

left:100%;

}

.left{

display:flex;
align-items:center;
gap:18px;

font-size:18px;
font-weight:600;

}

.left i{

font-size:28px;
width:35px;
text-align:center;

}

.youtube i{color:#ff0000;}
.spotify i{color:#1DB954;}
.tiktok i{color:#ffffff;}
.instagram i{color:#ff3ea5;}
.threads i{color:#ffffff;}
.telegram i{color:#29a9ea;}
.snapchat i{color:#FFD600;}
.facebook i{color:#1877F2;}
.twitter i{color:#ffffff;}
.email-card i{color:#ffb300;}

.arrow{

font-size:18px;
opacity:.8;

}

.footer{

margin-top:30px;

text-align:center;

font-size:13px;

color:#bbb;

}

<script>

document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("mousemove",e=>{

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

card.style.background=
`radial-gradient(circle at ${x}px ${y}px,
rgba(255,255,255,.28),
rgba(255,255,255,.10) 60%)`;

});

card.addEventListener("mouseleave",()=>{

card.style.background="rgba(255,255,255,.10)";

});

});

const cards=document.querySelectorAll(".card");

cards.forEach((card,index)=>{

card.style.opacity="0";
card.style.transform="translateY(30px)";

setTimeout(()=>{

card.style.transition=".6s ease";
card.style.opacity="1";
card.style.transform="translateY(0)";

},index*120);

});

</script>
