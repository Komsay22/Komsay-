<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komsay — Links</title>
    <!-- هێنانی فۆنتی مۆدێرن و ئایکۆنەکان -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-top: 20px;
        }

        /* بەشی پرۆفایل */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #262626;
            margin-bottom: 15px;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 15px;
            color: #a3a3a3;
            margin-bottom: 25px;
        }

        /* بەشی لینکەکان */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background-color: #121212;
            border: 1px solid #262626;
            border-radius: 16px;
            padding: 16px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .link-card:active {
            transform: scale(0.98);
            background-color: #1a1a1a;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background-color: #1a1a1a;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-left: 15px;
        }

        /* ڕێکخستنی دەقەکان بۆ لای ڕاست */
        .link-info {
            flex-grow: 1;
            text-align: right;
        }

        .link-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .link-subtitle {
            font-size: 13px;
            color: #737373;
        }

        .arrow-icon {
            color: #525252;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- وێنەی پرۆفایل - لۆگۆی کۆمسای -->
        <img src="https://i.imgur.com/vHqY7bE.jpeg" alt="Komsay" class="profile-img">
        
        <h1 class="name">Komsay</h1>
        <p class="bio">Kurdish Singer</p>

        <div class="links-container">
            
            <!-- YouTube -->
            <a href="https://youtube.com/@komsay" class="link-card" target="_blank">
                <div class="icon-box" style="color: #ff0000;"><i class="fab fa-youtube"></i></div>
                <div class="link-info">
                    <div class="link-title">YouTube</div>
                    <div class="link-subtitle">سەردانی چەناڵی فەرمی یوتیوب بکە</div>
                </div>
                <div class="arrow-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@komsay" class="link-card" target="_blank">
                <div class="icon-box"><i class="fab fa-tiktok"></i></div>
                <div class="link-info">
                    <div class="link-title">TikTok</div>
                    <div class="link-subtitle">سەردانی پەیجی تیکتۆک بکە</div>
                </div>
                <div class="arrow-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/komsay" class="link-card" target="_blank">
                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                <div class="link-info">
                    <div class="link-title">Instagram</div>
                    <div class="link-subtitle">لاپەڕەی فەرمی ئینستاگرام</div>
                </div>
                <div class="arrow-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
            </a>

            <!-- Snapchat -->
            <a href="https://snapchat.com/t/fDZ2XRY4" class="link-card" target="_blank">
                <div class="icon-box" style="color: #fffc00;"><i class="fab fa-snapchat"></i></div>
                <div class="link-info">
                    <div class="link-title">Snapchat</div>
                    <div class="link-subtitle">بۆ بینینی ستۆرییەکان</div>
                </div>
                <div class="arrow-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
            </a>

            <!-- Telegram -->
            <a href="https://t.me/Komsay" class="link-card" target="_blank">
                <div class="icon-box" style="color: #0088cc;"><i class="fab fa-telegram"></i></div>
                <div class="link-info">
                    <div class="link-title">Telegram</div>
                    <div class="link-subtitle">بۆ بینینی نوێکارییەکان لە چەناڵ</div>
                </div>
                <div class="arrow-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/Komsay" class="link-card" target="_blank">
                <div class="icon-box" style="color: #1877f2;"><i class="fab fa-facebook"></i></div>
                <div class="link-info">
                    <div class="link-title">Facebook</div>
                    <div class="link-subtitle">پەیجی فەرمی فەیسبووک</div>
                </div>
                <div class="arrow-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
            </a>

        </div>
    </div>

</body>
</html>
