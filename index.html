<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komsay — Official Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), 
                        url('https://i.postimg.cc/mD8Zf9f0/komsay-bg.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* دیزاینی وێنەی پڕۆفایلەکە بە جوڵەی تیشکی دەوری */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            background-image: linear-gradient(#000, #000), linear-gradient(45deg, #ff3366, #7000ff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            animation: rotateBorder 3s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotateBorder { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .link-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            display: block;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .link-card:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <!-- وێنە نوێیەکەت لێرەیە -->
        <img src="https://i.postimg.cc/Wb7F7rB3/komsay-new.jpg" alt="Komsay" class="profile-img">
        <h1 style="color: white; margin-bottom: 30px;">Komsay</h1>
        
        <a href="https://youtube.com/@komsay" class="link-card">YouTube</a>
        <a href="https://tiktok.com/@komsay" class="link-card">TikTok</a>
        <a href="https://instagram.com/komsay" class="link-card">Instagram</a>
        <a href="https://t.me/Komsay" class="link-card">Telegram</a>
    </div>
