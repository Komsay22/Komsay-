<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Komsay</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.85)),
url("IMG_0511.jpeg");

background-size:cover;
background-position:center;
background-attachment:fixed;

padding:25px;

}

.container{

width:100%;
max-width:430px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.18);

border-radius:35px;

padding:30px 25px 40px;

box-shadow:0 20px 60px rgba(0,0,0,.45);

}

.profile{

text-align:center;

margin-bottom:25px;

}

.profile img{

width:145px;
height:145px;

border-radius:50%;

object-fit:cover;

border:5px solid rgba(255,255,255,.8);

box-shadow:0 15px 35px rgba(0,0,0,.5);

}

.profile h1{

font-size:33px;

margin-top:18px;

font-weight:700;

color:white;

}

.profile p{

color:#ddd;

margin-top:8px;

font-size:15px;

letter-spacing:1px;

}

.links{

display:flex;

flex-direction:column;

gap:16px;

margin-top:30px;

}

.card{

display:flex;

align-items:center;

justify-content:space-between;

padding:18px 22px;

background:rgba(255,255,255,.10);

border:1px solid rgba(255,255,255,.15);

border-radius:22px;

backdrop-filter:blur(20px);

text-decoration:none;

color:white;

transition:.35s;

}

.card:hover{

transform:translateY(-4px) scale(1.02);

background:rgba(255,255,255,.18);

}

.left{

display:flex;

align-items:center;

gap:18px;

font-size:18px;

font-weight:600;

}

.left i{

font-size:28px;

width:35px;

text-align:center;

}

.youtube i{color:#ff0000;}
.tiktok i{color:#fff;}
.instagram i{color:#ff3ea5;}
.telegram i{color:#29a9ea;}
.snapchat i{color:#ffd600;}
.facebook i{color:#1877f2;}

.arrow{

font-size:18px;

opacity:.8;

}

</style>
</head>

<body>

<div class="container">

<div class="profile">

<img src="IMG_0511.jpeg">

<h1>Komsay</h1>

<p>Kurdish Singer</p>

</div>

<div class="links">

<a href="https://youtube.com/@komsay" class="card youtube">
    <div class="left">
        <i class="fab fa-youtube"></i>
        <span>YouTube</span>
    </div>
    <div class="arrow">
        <i class="fas fa-arrow-left"></i>
    </div>
</a>

<a href="https://tiktok.com/@komsay" class="card tiktok">
    <div class="left">
        <i class="fab fa-tiktok"></i>
        <span>TikTok</span>
    </div>
    <div class="arrow">
        <i class="fas fa-arrow-left"></i>
    </div>
</a>

<a href="https://instagram.com/komsay" class="card instagram">
    <div class="left">
        <i class="fab fa-instagram"></i>
        <span>Instagram</span>
    </div>
    <div class="arrow">
        <i class="fas fa-arrow-left"></i>
    </div>
</a>

<a href="https://t.me/Komsay" class="card telegram">
    <div class="left">
        <i class="fab fa-telegram"></i>
        <span>Telegram</span>
    </div>
    <div class="arrow">
        <i class="fas fa-arrow-left"></i>
    </div>
</a>

<a href="https://snapchat.com/add/komsay" class="card snapchat">
    <div class="left">
        <i class="fab fa-snapchat"></i>
        <span>Snapchat</span>
    </div>
    <div class="arrow">
        <i class="fas fa-arrow-left"></i>
    </div>
</a>

<a href="https://facebook.com/komsay" class="card facebook">
    <div class="left">
        <i class="fab fa-facebook"></i>
        <span>Facebook</span>
    </div>
    <div class="arrow">
        <i class="fas fa-arrow-left"></i>
    </div>
</a>

</div>

</div>

<script>

// Card animation
document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("mousemove",(e)=>{

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

card.style.background=
`radial-gradient(circle at ${x}px ${y}px,
rgba(255,255,255,.22),
rgba(255,255,255,.10) 60%)`;

});

card.addEventListener("mouseleave",()=>{

card.style.background="rgba(255,255,255,.10)";

});

});

</script>

</body>
</html>
