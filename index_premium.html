<!DOCTYPE html>

<title>Komsay | Official Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

.card i{font-size:30px;margin-bottom:8px}
.footer{text-align:center;margin-top:20px;color:#bbb;font-size:13px}
